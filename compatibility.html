<!DOCTYPE html>
<html>
<head>
    <title>Blood Compatibility</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

{% include 'navbar.html' %}

<div class="container">

    <h1>🧬 Blood Compatibility Checker</h1>

    <form method="POST">

        <label>Blood Group:</label>

        <select name="blood_type">
            <option>O-</option>
            <option>O+</option>
            <option>A-</option>
            <option>A+</option>
            <option>B-</option>
            <option>B+</option>
            <option>AB-</option>
            <option>AB+</option>
        </select>

        <br><br>

        <button type="submit">Check</button>

    </form>

    <br>

    {% if result %}
        <h2>{{ result }}</h2>
    {% endif %}

</div>

</body>
</html>
